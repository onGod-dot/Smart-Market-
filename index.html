<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartMarket</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url("/welcome-market.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 900px;
        }

        .footer-disclaimer {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 1.5rem;
            z-index: 2;
            text-align: center;
            padding: 0 1.25rem;
            font-size: 0.95rem;
            color: rgba(44, 44, 44, 0.75);
            line-height: 1.5;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 1rem;
            line-height: 1.2;
            text-shadow: 0 3px 16px rgba(0, 0, 0, 0.45);
        }

        .subtitle {
            font-size: 1.5rem;
            font-weight: 400;
            color: #f8fafc;
            line-height: 1.6;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }

        .cta-row {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.9rem 1.3rem;
            border-radius: 999px;
            background: #0077cc;
            color: #ffffff;
            text-decoration: none;
            font-weight: 650;
            font-size: 1rem;
            box-shadow: 0 10px 24px rgba(0, 119, 204, 0.25);
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        .cta-button:hover {
            transform: translateY(-1px);
            background: #0069b4;
            box-shadow: 0 12px 28px rgba(0, 119, 204, 0.33);
        }

        .cta-button:focus-visible {
            outline: 3px solid rgba(0, 119, 204, 0.35);
            outline-offset: 4px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
            .cta-button {
                width: 100%;
                max-width: 320px;
            }
            .footer-disclaimer {
                bottom: 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to SmartMarket</h1>
            <p class="subtitle">Where Market Analytics Meets Prediction</p>
            <div class="cta-row">
                <a class="cta-button" href="/app.html" aria-label="Get started and open the dashboard">
                    Get Started
                </a>
            </div>
        </div>
        <div class="footer-disclaimer">
            <strong>Disclaimer:</strong> All Analytics and Predictions where made from data collected from Tarkwa Market between the Period of 2025 -12-0 to 2026-03
        </div>
    </section>
</body>
</html>
